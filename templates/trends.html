<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>추세 상승 감지 — StockAnalyzer</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="application-name" content="StockAnalyzer" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="StockAnalyzer" />
  <link rel="apple-touch-icon" href="/static/icons/icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png" />

  <link rel="stylesheet" href="/static/css/style.css" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
          .catch(err => console.warn('SW register failed:', err));
      });
    }
  </script>
</head>
<body>
  <!-- 헤더 -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">📈 StockAnalyzer</div>
      <nav class="nav">
        <a href="/" class="nav-link">분석</a>
        <a href="/trends" class="nav-link active">추세 상승 감지</a>
        <a href="/trading" class="nav-link">모의투자</a>
      </nav>
    </div>
  </header>

  <!-- 추세 상승 감지 메인 -->
  <main class="trends-main">

    <!-- 인트로 / 컨트롤 패널 -->
    <section class="trends-hero">
      <h1 class="trends-title">📈 추세 상승 감지 종목</h1>
      <p class="trends-desc">
        설정된 기준에 따라 추세 상승 중인 종목을 자동으로 탐지합니다.
      </p>

      <!-- 시장 선택 + 검색 트리거 -->
      <div class="trends-control">
        <div class="trends-market-toggle" id="marketToggle">
          <button class="market-btn active" data-market="ALL">전체</button>
          <button class="market-btn" data-market="KR">한국</button>
          <button class="market-btn" data-market="US">미국</button>
        </div>

        <button id="scanBtn" class="trends-scan-btn" onclick="scanTrends()">
          🔍 추세 종목 스캔
        </button>
      </div>

      <!-- 기준 요약 (설정값 표시 영역, 추후 확정 후 채움) -->
      <div class="trends-criteria-box">
        <span class="criteria-label">📋 탐지 기준:</span>
        <span class="criteria-text" id="criteriaText">
          기준 미설정 — 사용자 정의 후 적용 예정
        </span>
      </div>
    </section>

    <!-- 결과 통계 -->
    <section class="trends-stats hidden" id="trendsStats">
      <div class="stat-item">
        <div class="stat-label">스캔 종목 수</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">감지 종목 수</div>
        <div class="stat-value highlight" id="statHits">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">스캔 시각</div>
        <div class="stat-value" id="statTime">—</div>
      </div>
    </section>

    <!-- 결과 리스트 -->
    <section class="trends-results">
      <div id="trendsLoading" class="trends-loading hidden">
        <div class="spinner"></div>
        <p>스캔 중... (수십~수백 종목 분석에 1~3분 소요)</p>
      </div>

      <div id="trendsEmpty" class="trends-empty">
        <div class="empty-icon">🌱</div>
        <h3>아직 결과가 없습니다</h3>
        <p>위 <strong>"추세 종목 스캔"</strong> 버튼을 눌러 시작하세요.</p>
        <p class="hint">※ 실제 탐지 기준은 사용자가 정의할 예정입니다.</p>
      </div>

      <div id="trendsGrid" class="trends-grid hidden">
        <!-- JS로 카드 렌더링 -->
      </div>
    </section>

  </main>

  <script>
    // ── 시장 토글 ──
    document.querySelectorAll('#marketToggle .market-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#marketToggle .market-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // ── 시간 포맷 ──
    function fmtTime(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleString('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
      } catch { return '—'; }
    }

    // ── 가격 변화 색상 ──
    function pctClass(v) { return v > 0 ? 'up' : v < 0 ? 'down' : 'flat'; }
    function fmtPct(v)   { return (v > 0 ? '+' : '') + v.toFixed(2) + '%'; }

    // ── 카드 렌더링 ──
    function renderTrendCard(item) {
      const chg  = item.change_pct ?? 0;
      const cls  = pctClass(chg);
      const name = item.name || item.ticker;
      return `
        <a href="/?ticker=${encodeURIComponent(item.ticker)}" class="trend-card">
          <div class="trend-card-hd">
            <div class="trend-name">${name}</div>
            <div class="trend-ticker">${item.ticker}</div>
          </div>
          <div class="trend-price">
            <span class="trend-price-val">${item.price != null ? item.price.toLocaleString() : '—'}</span>
            <span class="trend-pct ${cls}">${fmtPct(chg)}</span>
          </div>
          ${item.signals && item.signals.length ? `
            <div class="trend-signals">
              ${item.signals.map(s => `<span class="trend-signal">${s}</span>`).join('')}
            </div>` : ''}
          ${item.reason ? `<div class="trend-reason">${item.reason}</div>` : ''}
        </a>`;
    }

    // ── 스캔 호출 ──
    async function scanTrends() {
      const market = document.querySelector('#marketToggle .market-btn.active').dataset.market;
      const btn    = document.getElementById('scanBtn');
      const load   = document.getElementById('trendsLoading');
      const empty  = document.getElementById('trendsEmpty');
      const grid   = document.getElementById('trendsGrid');
      const stats  = document.getElementById('trendsStats');

      btn.disabled = true;
      btn.textContent = '⏳ 스캔 중...';
      empty.classList.add('hidden');
      grid.classList.add('hidden');
      stats.classList.add('hidden');
      load.classList.remove('hidden');

      try {
        const resp = await fetch(`/api/trends?market=${market}`);
        const data = await resp.json();

        document.getElementById('statTotal').textContent = data.total ?? '—';
        document.getElementById('statHits').textContent  = (data.items || []).length;
        document.getElementById('statTime').textContent  = fmtTime(data.scanned_at);
        stats.classList.remove('hidden');

        if (!data.items || !data.items.length) {
          empty.classList.remove('hidden');
          empty.querySelector('h3').textContent = '감지된 종목이 없습니다';
          empty.querySelector('p').textContent  = data.message || '기준에 맞는 종목이 없거나 기준이 설정되지 않았습니다.';
        } else {
          grid.innerHTML = data.items.map(renderTrendCard).join('');
          grid.classList.remove('hidden');
        }
      } catch (e) {
        empty.classList.remove('hidden');
        empty.querySelector('h3').textContent = '오류 발생';
        empty.querySelector('p').textContent  = e.message || '서버 응답 오류';
      } finally {
        btn.disabled = false;
        btn.textContent = '🔍 추세 종목 스캔';
        load.classList.add('hidden');
      }
    }
  </script>
</body>
</html>
