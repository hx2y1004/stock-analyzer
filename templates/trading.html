<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>모의투자 — StockAnalyzer</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="application-name" content="StockAnalyzer" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="StockAnalyzer" />
  <link rel="apple-touch-icon" href="/static/icons/icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png" />

  <link rel="stylesheet" href="/static/css/style.css" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
          .catch(err => console.warn('SW register failed:', err));
      });
    }
  </script>
</head>
<body>
  <!-- 헤더 -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">📈 StockAnalyzer</div>
      <nav class="nav">
        <a href="/" class="nav-link">분석</a>
        <a href="/trading" class="nav-link active">모의투자</a>
      </nav>
      <div id="authArea" class="auth-area">
        <button class="login-btn" onclick="location.href='/auth/google'">로그인</button>
      </div>
    </div>
  </header>

  <!-- 모의투자 메인 -->
  <main class="trading-main" id="tradingMain">

    <!-- 비로그인 안내 -->
    <section id="loginRequired" class="card hidden" style="text-align:center; padding:60px 20px;">
      <div style="font-size:48px; margin-bottom:16px">🔐</div>
      <h2 style="margin-bottom:12px">로그인이 필요합니다</h2>
      <p style="color:var(--text2); margin-bottom:24px">
        모의투자는 로그인 후 이용 가능합니다.<br>
        신규 가입 시 <strong style="color:var(--accent)">1억원</strong>의 초기 자본을 드립니다!
      </p>
      <button class="position-login-btn" onclick="location.href='/auth/google'">로그인하기</button>
    </section>

    <!-- 대시보드 -->
    <div id="tradingDashboard" class="hidden">

      <!-- 자산 요약 -->
      <section class="card portfolio-summary">
        <div class="ps-header">
          <h2 class="card-title">💼 내 자산</h2>
          <button class="ps-reset-btn" onclick="resetTrading()" title="초기화">🔄 초기화</button>
        </div>
        <div class="ps-main">
          <div class="ps-total" id="psTotal">—</div>
          <div class="ps-return" id="psReturn">—</div>
        </div>
        <div class="ps-grid">
          <div class="ps-item">
            <div class="ps-label">💵 보유 현금</div>
            <div class="ps-val" id="psCash">—</div>
          </div>
          <div class="ps-item">
            <div class="ps-label">📈 평가 금액</div>
            <div class="ps-val" id="psPositions">—</div>
          </div>
          <div class="ps-item">
            <div class="ps-label">📊 평가 손익</div>
            <div class="ps-val" id="psUnrealized">—</div>
          </div>
          <div class="ps-item">
            <div class="ps-label">💰 실현 손익</div>
            <div class="ps-val" id="psRealized">—</div>
          </div>
        </div>
        <div class="ps-stats" id="psStats"></div>
      </section>

      <!-- 빠른 매수 -->
      <section class="card quick-buy-card">
        <h3 class="card-title">⚡ 빠른 매수</h3>
        <div class="qb-row">
          <div class="qb-search-wrap" style="position:relative; flex:2; min-width:0;">
            <input id="qbTicker" class="add-input" type="text" placeholder="종목명 또는 티커 (예: AAPL, 삼성전자)" autocomplete="off"/>
            <div id="qbAcList" class="autocomplete-list hidden" style="top:100%;left:0;right:0;z-index:200"></div>
          </div>
          <button class="add-submit-btn" onclick="openQuickBuy()" style="flex:0; padding:10px 24px; white-space:nowrap;">📊 매수</button>
        </div>
        <div id="qbBadge" style="margin-top:8px; font-size:12px; color:var(--text2)"></div>
      </section>

      <!-- 보유 종목 -->
      <section class="card">
        <h3 class="card-title">📦 보유 종목 (<span id="holdingCount">0</span>개)</h3>
        <div id="positionsList" class="positions-list">
          <div class="empty-state">보유 종목이 없습니다. 위에서 매수해보세요!</div>
        </div>
      </section>

      <!-- 거래 내역 -->
      <section class="card">
        <h3 class="card-title">📜 거래 내역</h3>
        <div id="transactionsList" class="tx-list">
          <div class="empty-state">거래 내역이 없습니다</div>
        </div>
      </section>

    </div>
  </main>

  <!-- ── 모의 매수 모달 ── -->
  <div id="tradeBuyModal" class="modal-overlay hidden" onclick="closeBuyModal(event)">
    <div class="modal-box">
      <button class="modal-close" onclick="closeBuyModal()">✕</button>
      <h2 class="modal-title" style="font-size:18px;margin-bottom:8px">💰 모의 매수</h2>
      <p id="buyModalDesc" class="modal-desc" style="margin-bottom:20px"></p>
      <div class="add-form">
        <input type="hidden" id="buyTicker" />
        <input type="hidden" id="buyName" />
        <input type="hidden" id="buyCurrency" />
        <div class="add-field">
          <label>매수가 <span id="buyCurrencyLabel">(USD)</span></label>
          <div class="num-input-wrap">
            <input id="buyPrice" class="add-input" type="number" min="0" step="any" inputmode="decimal" />
            <div class="num-steppers">
              <button type="button" class="num-step-btn" tabindex="-1" onclick="_stepTradeNum('buy','buyPrice', 1)">▲</button>
              <button type="button" class="num-step-btn" tabindex="-1" onclick="_stepTradeNum('buy','buyPrice', -1)">▼</button>
            </div>
          </div>
        </div>
        <div class="add-field">
          <label>수량</label>
          <div class="num-input-wrap">
            <input id="buyQty" class="add-input" type="number" min="0" step="1" inputmode="numeric" />
            <div class="num-steppers">
              <button type="button" class="num-step-btn" tabindex="-1" onclick="_stepTradeNum('buy','buyQty', 1)">▲</button>
              <button type="button" class="num-step-btn" tabindex="-1" onclick="_stepTradeNum('buy','buyQty', -1)">▼</button>
            </div>
          </div>
        </div>
        <div class="trade-summary" id="buySummary"></div>
        <button class="add-submit-btn buy-action-btn" onclick="submitBuy()">💰 매수 실행</button>
      </div>
    </div>
  </div>

  <!-- ── 모의 매도 모달 ── -->
  <div id="tradeSellModal" class="modal-overlay hidden" onclick="closeSellModal(event)">
    <div class="modal-box">
      <button class="modal-close" onclick="closeSellModal()">✕</button>
      <h2 class="modal-title" style="font-size:18px;margin-bottom:8px">💸 모의 매도</h2>
      <p id="sellModalDesc" class="modal-desc" style="margin-bottom:20px"></p>
      <div class="add-form">
        <input type="hidden" id="sellTicker" />
        <input type="hidden" id="sellCurrency" />
        <div class="add-field">
          <label>매도가 <span id="sellCurrencyLabel">(USD)</span></label>
          <div class="num-input-wrap">
            <input id="sellPrice" class="add-input" type="number" min="0" step="any" inputmode="decimal" />
            <div class="num-steppers">
              <button type="button" class="num-step-btn" tabindex="-1" onclick="_stepTradeNum('sell','sellPrice', 1)">▲</button>
              <button type="button" class="num-step-btn" tabindex="-1" onclick="_stepTradeNum('sell','sellPrice', -1)">▼</button>
            </div>
          </div>
        </div>
        <div class="add-field">
          <label>수량 (최대 <span id="sellMaxQty">0</span>주)</label>
          <div class="num-input-wrap">
            <input id="sellQty" class="add-input" type="number" min="0" step="1" inputmode="numeric" />
            <div class="num-steppers">
              <button type="button" class="num-step-btn" tabindex="-1" onclick="_stepTradeNum('sell','sellQty', 1)">▲</button>
              <button type="button" class="num-step-btn" tabindex="-1" onclick="_stepTradeNum('sell','sellQty', -1)">▼</button>
            </div>
          </div>
          <button type="button" class="sell-max-btn" onclick="setSellMax()">전량 매도</button>
        </div>
        <div class="trade-summary" id="sellSummary"></div>
        <button class="add-submit-btn sell-action-btn" onclick="submitSell()">💸 매도 실행</button>
      </div>
    </div>
  </div>

  <script src="/static/js/trading.js"></script>
</body>
</html>
